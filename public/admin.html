<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Registrations</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f4f1; --surface: #fff; --border: #e0e0da;
      --text: #1a1a1a; --muted: #6b6b67; --hint: #a0a09a;
      --accent: #1a1a1a; --accent-fg: #fff;
      --green: #1a6b1a; --green-bg: #edfaed; --green-border: #b2e6b2;
      --danger: #c0392b; --danger-bg: #fff5f5; --danger-border: #f5c0bc;
      --radius: 10px; --radius-sm: 6px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }

    /* ── Login ── */
    .login-wrap {
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 2rem;
    }
    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 2.5rem 2rem;
      width: 100%; max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .login-icon { text-align: center; font-size: 36px; color: var(--muted); margin-bottom: 1.25rem; }
    .login-card h1 { text-align: center; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .login-card p { text-align: center; font-size: 14px; color: var(--muted); margin-bottom: 1.75rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 5px; }
    .field input {
      width: 100%; padding: 10px 13px; font-size: 15px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text); font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input:focus { outline: none; border-color: #999; box-shadow: 0 0 0 3px rgba(0,0,0,0.06); }
    .login-btn {
      width: 100%; padding: 12px; font-size: 15px; font-weight: 600;
      background: var(--accent); color: var(--accent-fg); border: none;
      border-radius: var(--radius-sm); cursor: pointer;
      transition: opacity 0.15s; margin-top: 0.25rem;
    }
    .login-btn:hover { opacity: 0.85; }
    .login-err {
      background: var(--danger-bg); border: 1px solid var(--danger-border);
      border-radius: var(--radius-sm); padding: 9px 13px;
      font-size: 13px; color: var(--danger); margin-top: 0.75rem;
      display: none; align-items: center; gap: 7px;
    }

    /* ── Dashboard ── */
    .dashboard { display: none; }
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 2rem; height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar-left h1 { font-size: 17px; font-weight: 700; }
    .topbar-left span { font-size: 12px; color: var(--muted); background: var(--bg); border: 1px solid var(--border); border-radius: 50px; padding: 3px 10px; }
    .topbar-right { display: flex; gap: 8px; align-items: center; }

    .btn {
      padding: 8px 14px; font-size: 13px; font-weight: 500;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: var(--surface); color: var(--text); cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px;
      transition: background 0.12s, border-color 0.12s; white-space: nowrap;
    }
    .btn:hover { background: var(--bg); border-color: #ccc; }
    .btn.primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
    .btn.primary:hover { opacity: 0.85; }
    .btn.danger { color: var(--danger); border-color: var(--danger-border); }
    .btn.danger:hover { background: var(--danger-bg); }

    .main { padding: 2rem; }

    /* ── Stats row ── */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.75rem; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem 1.5rem;
    }
    .stat-card .label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--hint); margin-bottom: 6px; }
    .stat-card .value { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
    .stat-card .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* ── Controls ── */
    .controls {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 1rem; flex-wrap: wrap;
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-wrap i { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--hint); font-size: 13px; pointer-events: none; }
    .search-wrap input {
      width: 100%; padding: 9px 13px 9px 33px; font-size: 14px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: var(--surface); color: var(--text); font-family: inherit;
    }
    .search-wrap input:focus { outline: none; border-color: #999; }

    /* ── Table ── */
    .table-outer { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.04); }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; color: var(--hint);
      background: var(--bg); border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    tbody td {
      padding: 11px 14px; border-bottom: 1px solid var(--border); color: var(--text);
      max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafaf8; }
    .action-btn {
      padding: 4px 9px; font-size: 12px; border: 1px solid var(--danger-border);
      border-radius: 5px; color: var(--danger); background: transparent;
      cursor: pointer; transition: background 0.12s;
    }
    .action-btn:hover { background: var(--danger-bg); }

    .empty {
      text-align: center; padding: 3rem; color: var(--hint); font-size: 14px;
    }
    .empty i { font-size: 28px; display: block; margin-bottom: 10px; }

    .table-footer {
      padding: 10px 14px; border-top: 1px solid var(--border);
      font-size: 12px; color: var(--hint); background: var(--bg);
      display: flex; align-items: center; justify-content: space-between;
    }

    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: var(--text); color: var(--accent-fg);
      padding: 10px 18px; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 500; opacity: 0;
      transition: opacity 0.2s; pointer-events: none; z-index: 100;
    }
    .toast.show { opacity: 1; }
    @media(max-width:600px){ .stats{grid-template-columns:1fr 1fr} }
    @media(max-width:400px){ .stats{grid-template-columns:1fr} }
  </style>
</head>
<body>

<!-- ── Login ── -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-icon"><i class="fa-solid fa-shield-halved"></i></div>
    <h1>Admin Panel</h1>
    <p>Enter your password to access the registration dashboard</p>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pw-input" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <button class="login-btn" onclick="login()"><i class="fa-solid fa-right-to-bracket"></i> Sign in</button>
    <div class="login-err" id="login-err"><i class="fa-solid fa-circle-exclamation"></i><span id="login-err-text"></span></div>
  </div>
</div>

<!-- ── Dashboard ── -->
<div class="dashboard" id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <h1><i class="fa-solid fa-table-list"></i> Registrations</h1>
      <span id="live-count">0 members</span>
    </div>
    <div class="topbar-right">
      <button class="btn primary" onclick="exportExcel()"><i class="fa-solid fa-file-excel"></i> Export Excel</button>
      <button class="btn" onclick="loadData()"><i class="fa-solid fa-rotate-right"></i> Refresh</button>
      <button class="btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>
  </div>

  <div class="main">
    <div class="stats">
      <div class="stat-card">
        <div class="label">Total registered</div>
        <div class="value" id="stat-total">0</div>
        <div class="sub">all time</div>
      </div>
      <div class="stat-card">
        <div class="label">Today</div>
        <div class="value" id="stat-today">0</div>
        <div class="sub">registrations</div>
      </div>
      <div class="stat-card">
        <div class="label">With organization</div>
        <div class="value" id="stat-org">0</div>
        <div class="sub">out of total</div>
      </div>
    </div>

    <div class="controls">
      <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="search-input" placeholder="Search by name, email, organization…" oninput="filterTable()"/>
      </div>
      <button class="btn danger" onclick="confirmClearAll()"><i class="fa-solid fa-trash"></i> Clear all</button>
    </div>

    <div class="table-outer">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Full name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Organization</th>
              <th>Job title</th>
              <th>Department</th>
              <th>Country</th>
              <th>Diet</th>
              <th>Source</th>
              <th>Comments</th>
              <th>Registered at</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <div class="table-footer">
        <span id="table-footer-text">Loading…</span>
        <span id="search-count"></span>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = '';
  let token = sessionStorage.getItem('admin_token') || '';
  let allData = [];

  // ── Auto-login if token stored ──
  if (token) initDashboard();

  async function login() {
    const pw = document.getElementById('pw-input').value;
    if (!pw) return;
    try {
      const res = await fetch(API + '/api/admin/login', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ password: pw })
      });
      const data = await res.json();
      if (!res.ok) {
        const err = document.getElementById('login-err');
        document.getElementById('login-err-text').textContent = data.error || 'Login failed.';
        err.style.display = 'flex'; return;
      }
      token = data.token;
      sessionStorage.setItem('admin_token', token);
      document.getElementById('login-err').style.display = 'none';
      initDashboard();
    } catch(e) {
      const err = document.getElementById('login-err');
      document.getElementById('login-err-text').textContent = 'Cannot connect to server.';
      err.style.display = 'flex';
    }
  }

  function initDashboard() {
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadData();
  }

  function logout() {
    sessionStorage.removeItem('admin_token');
    token = '';
    document.getElementById('login-wrap').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('pw-input').value = '';
  }

  async function loadData() {
    try {
      const res = await fetch(API + '/api/admin/registrations', {
        headers: { 'x-admin-token': token }
      });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();
      allData = data.data || [];
      renderStats();
      renderTable(allData);
      document.getElementById('live-count').textContent = allData.length + ' member' + (allData.length === 1 ? '' : 's');
    } catch(e) {
      showToast('Failed to load data. Is the server running?');
    }
  }

  function renderStats() {
    const today = new Date().toLocaleDateString();
    const todayCount = allData.filter(r => new Date(r.createdAt).toLocaleDateString() === today).length;
    const withOrg = allData.filter(r => r.organization).length;
    document.getElementById('stat-total').textContent = allData.length;
    document.getElementById('stat-today').textContent = todayCount;
    document.getElementById('stat-org').textContent = withOrg;
  }

  function renderTable(data) {
    const body = document.getElementById('table-body');
    const footer = document.getElementById('table-footer-text');
    if (!data.length) {
      body.innerHTML = `<tr><td colspan="13" class="empty"><i class="fa-regular fa-folder-open"></i>No registrations found.</td></tr>`;
      footer.textContent = '0 records';
      return;
    }
    body.innerHTML = data.map((r, i) => `
      <tr>
        <td>${i + 1}</td>
        <td title="${esc(r.name)}">${esc(r.name)}</td>
        <td title="${esc(r.email)}">${esc(r.email)}</td>
        <td>${esc(r.phone)}</td>
        <td title="${esc(r.organization)}">${esc(r.organization) || '—'}</td>
        <td title="${esc(r.jobTitle)}">${esc(r.jobTitle) || '—'}</td>
        <td title="${esc(r.department)}">${esc(r.department) || '—'}</td>
        <td>${esc(r.country) || '—'}</td>
        <td>${esc(r.diet) || 'None'}</td>
        <td>${esc(r.source) || '—'}</td>
        <td title="${esc(r.comments)}">${esc(r.comments) || '—'}</td>
        <td style="white-space:nowrap">${esc(r.registeredAt)}</td>
        <td><button class="action-btn" onclick="deleteRecord('${r._id}')"><i class="fa-solid fa-trash"></i></button></td>
      </tr>
    `).join('');
    footer.textContent = `${data.length} record${data.length === 1 ? '' : 's'}`;
  }

  function filterTable() {
    const q = document.getElementById('search-input').value.toLowerCase();
    if (!q) { renderTable(allData); document.getElementById('search-count').textContent=''; return; }
    const filtered = allData.filter(r =>
      [r.name, r.email, r.phone, r.organization, r.jobTitle, r.department, r.country, r.comments]
        .some(v => (v||'').toLowerCase().includes(q))
    );
    renderTable(filtered);
    document.getElementById('search-count').textContent = `${filtered.length} match${filtered.length===1?'':'es'}`;
  }

  async function deleteRecord(id) {
    if (!confirm('Delete this registration? This cannot be undone.')) return;
    try {
      const res = await fetch(API + '/api/admin/registrations/' + id, {
        method: 'DELETE', headers: {'x-admin-token': token}
      });
      if (!res.ok) throw new Error();
      allData = allData.filter(r => r._id !== id);
      renderStats(); filterTable();
      document.getElementById('live-count').textContent = allData.length + ' member' + (allData.length === 1 ? '' : 's');
      showToast('Registration deleted.');
    } catch(e) { showToast('Failed to delete.'); }
  }

  async function confirmClearAll() {
    if (!allData.length) { showToast('No records to clear.'); return; }
    if (!confirm(`Delete ALL ${allData.length} registrations? This cannot be undone.`)) return;
    // Delete one by one
    for (const r of [...allData]) await deleteRecord(r._id);
  }

  function exportExcel() {
    const link = document.createElement('a');
    link.href = API + '/api/admin/export';
    // Pass token via URL for file download (simple approach)
    link.href = API + '/api/admin/export?t=' + encodeURIComponent(token);
    link.click();
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
